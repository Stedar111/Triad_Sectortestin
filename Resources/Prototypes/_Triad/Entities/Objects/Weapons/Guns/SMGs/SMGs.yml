- type: entity
  name: HZD Squire (9x19mm)
  parent: [BaseWeaponSubMachineGun, BaseGunWieldable, BaseGunToggleable]
  id: WeaponSubMachineGunSquire
  description: A somewhat novel SMG design featuring a rare folding stock for stowage, near uncontrollable with its stock folded.  Designed by HZD to fit the niche weapon requirements of combatants with strict storage capacity.
  components:
  - type: GunToggleableBonus
    minAngle: 10
    maxAngle: 20
    bonusFireRate: 0
    requiresToggle: false
  - type: ItemToggleSize
    activatedSize: Small
    activatedShape:
    - 0,0,1,1
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/SMGs/ak220.rsi
    layers:
    - state: base
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-0
      map: [ "enum.GunVisualLayers.Mag" ]
  - type: GunWieldBonus
    minAngle: -15
    maxAngle: -25
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/ltrifle_cock.ogg
  - type: Clothing
    sprite: _Mono/Objects/Weapons/Guns/SMGs/ak220.rsi
  - type: Gun
    minAngle: 27
    maxAngle: 45
    fireRate: 7.5
    angleIncrease: 19
    angleDecay: 10
    selectedMode: FullAuto
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/SmallArms/Gunshots/smg.ogg
    availableModes:
    - SemiAuto
    - FullAuto
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine9x19mmSubMachineGunFMJ
        insertSound: /Audio/_Mono/Weapons/Guns/SmallArms/MagIn/cm82_magin.ogg
        ejectSound: /Audio/_Mono/Weapons/Guns/SmallArms/MagOut/pistol_alt_magout.ogg
        priority: 2
        whitelist:
          tags:
          - Magazine9x19mmSubMachineGunFMJ
    gun_chamber:
      name: Chamber
      startingItem: Cartridge9x19mmFMJ
      priority: 1
      whitelist:
       tags:
       - Cartridge9x19mmFMJ
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: StaticPrice
    price: 500
